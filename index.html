<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モルックスコア管理</title>

<style>
body {
    font-family: sans-serif;
    background: #f4f4f4;
    text-align: center;
    padding: 10px;
}

h1 {
    margin-bottom: 10px;
}

.team {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input {
    width: 60px;
    padding: 5px;
    font-size: 18px;
    text-align: center;
}

button {
    padding: 8px 15px;
    font-size: 16px;
    margin-left: 5px;
}

.score {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.history {
    font-size: 14px;
    margin-top: 8px;
    text-align: left;
    max-height: 120px;
    overflow-y: auto;
}

.resetBtn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🔥 モルックスコア管理 🔥</h1>

<div class="team">
    <h2>チームA</h2>
    <input type="number" id="inputA" min="0">
    <button onclick="addScore('A')">追加</button>
    <div class="score">合計: <span id="scoreA">0</span></div>
    <div class="history" id="historyA"></div>
</div>

<div class="team">
    <h2>チームB</h2>
    <input type="number" id="inputB" min="0">
    <button onclick="addScore('B')">追加</button>
    <div class="score">合計: <span id="scoreB">0</span></div>
    <div class="history" id="historyB"></div>
</div>

<button class="resetBtn" onclick="resetGame()">リセット</button>

<script>
let scoreA = 0;
let scoreB = 0;
let zeroA = 0;
let zeroB = 0;

function addScore(team) {
    let input = document.getElementById("input" + team);
    let value = parseInt(input.value);

    if (isNaN(value)) return;

    if (team === "A") {
        if (value === 0) {
            zeroA++;
            if (zeroA === 3) {
                scoreA -= 10;
                zeroA = 0;
                addHistory("A", "0×3 → -10点");
            }
        } else {
            zeroA = 0;
            scoreA += value;
            addHistory("A", "+" + value);
        }

        if (scoreA > 50) {
            scoreA = 25;
            addHistory("A", "50超え → 25点に戻る");
        }

        document.getElementById("scoreA").textContent = scoreA;
    }

    if (team === "B") {
        if (value === 0) {
            zeroB++;
            if (zeroB === 3) {
                scoreB -= 10;
                zeroB = 0;
                addHistory("B", "0×3 → -10点");
            }
        } else {
            zeroB = 0;
            scoreB += value;
            addHistory("B", "+" + value);
        }

        if (scoreB > 50) {
            scoreB = 25;
            addHistory("B", "50超え → 25点に戻る");
        }

        document.getElementById("scoreB").textContent = scoreB;
    }

    input.value = "";
}

function addHistory(team, text) {
    let historyDiv = document.getElementById("history" + team);
    let p = document.createElement("div");
    p.textContent = text;
    historyDiv.prepend(p);
}

function resetGame() {
    scoreA = 0;
    scoreB = 0;
    zeroA = 0;
    zeroB = 0;

    document.getElementById("scoreA").textContent = 0;
    document.getElementById("scoreB").textContent = 0;
    document.getElementById("historyA").innerHTML = "";
    document.getElementById("historyB").innerHTML = "";
}
</script>

</body>
</html>
